<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>俄罗斯方块 P3 - 炫酷特效版</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --text-color: #fff;
            --secondary-text: #888;
            --accent-color: #00d4ff;
            --canvas-bg: #0f0f1a;
            --canvas-border: #333;
            --btn-gradient-start: #3a3a5c;
            --btn-gradient-end: #2a2a4c;
            --game-over-bg: rgba(0,0,0,0.85);
            --game-over-text: #ff4757;
            --final-score-color: #fff;
            --restart-gradient-start: #00d4ff;
            --restart-gradient-end: #00aacc;
        }

        .dark-theme {
            --bg-color: #FFF8E1;
            --text-color: #1a1a2e;
            --secondary-text: #666;
            --accent-color: #0066cc;
            --canvas-bg: #1a1a2e;
            --canvas-border: #cccccc;
            --btn-gradient-start: #4a90e2;
            --btn-gradient-end: #357ab8;
            --game-over-bg: rgba(0,0,0,0.6);
            --game-over-text: #d0021b;
            --final-score-color: #1a1a2e;
            --restart-gradient-start: #0066cc;
            --restart-gradient-end: #004c99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); background-image: radial-gradient(circle, rgba(210,180,140,0.3) 1px, transparent 1px); background-size: 15px 15px; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text-color); padding: 10px; overflow-x: hidden; box-sizing: border-box; }
        .header { display: flex; gap: 30px; font-size: 16px; margin-bottom: 15px; flex-shrink: 0; flex-wrap: wrap; justify-content: center; }
        .stat { text-align: center; }
        .stat-label { color: var(--secondary-text); font-size: 12px; }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--accent-color); }
        #gameCanvas { border: 3px solid var(--canvas-border); border-radius: 4px; background: var(--canvas-bg); }
        .btn { background: linear-gradient(145deg, var(--btn-gradient-start), var(--btn-gradient-end)); border: none; color: #fff; border-radius: 12px; cursor: pointer; transition: all 0.1s; }
        .btn:active { transform: scale(0.95); }
        .game-over-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--game-over-bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .game-over-overlay.show { display: flex; }
        .game-over-text { font-size: 36px; color: var(--game-over-text); margin-bottom: 20px; }
        .final-score { font-size: 24px; margin-bottom: 30px; color: var(--final-score-color); }
        .restart-btn { background: linear-gradient(145deg, var(--restart-gradient-start), var(--restart-gradient-end)); border: none; color: #fff; padding: 15px 40px; font-size: 20px; border-radius: 30px; cursor: pointer; }

        /* 音效控制栏 */
        .sound-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .sound-controls .btn {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 8px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .volume-control input {
            width: 60px;
            cursor: pointer;
        }

        /* 新布局:旋转居中→左/右/下→开始/暂停/结束 */
        .rotate-section {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 340px;
            margin-top: 8px;
            flex-shrink: 0;
        }

        .rotate-section .btn {
            padding: 20px;
            font-size: 24px;
            min-width: 60px;
        }

        .direction-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 340px;
            margin-top: 8px;
            flex-shrink: 0;
        }

        .direction-controls .btn {
            padding: 20px;
            font-size: 24px;
            min-width: 60px;
        }

        .bottom-controls-container {
            width: 100%;
            max-width: 340px;
            margin-top: 8px;
            margin-bottom: 5px;
            flex-shrink: 0;
            position: relative;
            height: 70px;
            overflow: hidden;
            transition: height 0.3s ease, opacity 0.3s ease;
        }

        .bottom-controls-container.collapsed {
            height: 4px;
            opacity: 0.3;
        }

        .bottom-controls-container .game-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            width: 100%;
            position: absolute;
            bottom: 0;
            transition: transform 0.3s ease;
        }

        .bottom-controls-container.collapsed .game-controls {
            transform: translateY(100%);
        }

        .game-controls .btn {
            padding: 20px;
            font-size: 24px;
            min-width: 60px;
            border-radius: 8px;
        }

        /* Combo特效样式 */
        .combo-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 200;
            overflow: hidden;
        }

        .combo-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: comboFloat 1.5s ease-out forwards;
            white-space: nowrap;
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        @keyframes comboFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* 主题:赛博粉 */
        .theme-cyberpunk-pink {
            --bg-color: #1a1a2e;
            --text-color: #fff;
            --secondary-text: #aaa;
            --accent-color: #ff6bff;
            --canvas-bg: #0f0f1a;
            --canvas-border: #ff6bff;
            --btn-gradient-start: #ff6bff;
            --btn-gradient-end: #ff3399;
            --game-over-bg: rgba(26,26,46,0.9);
            --game-over-text: #ff6bff;
            --final-score-color: #ff6bff;
            --restart-gradient-start: #ff6bff;
            --restart-gradient-end: #ff3399;
        }

        /* 主题:复古绿 */
        .theme-retro-green {
            --bg-color: #000;
            --text-color: #00ff00;
            --secondary-text: #00aa00;
            --accent-color: #00ff00;
            --canvas-bg: #001100;
            --canvas-border: #00ff00;
            --btn-gradient-start: #003300;
            --btn-gradient-end: #005500;
            --game-over-bg: rgba(0,0,0,0.9);
            --game-over-text: #00ff00;
            --final-score-color: #00ff00;
            --restart-gradient-start: #00ff00;
            --restart-gradient-end: #00aa00;
        }

        /* CRT扫描线效果 - 仅复古绿主题使用 */
        body.theme-retro-green::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 2px,
                rgba(0, 255, 0, 0.15) 2px,
                rgba(0, 255, 0, 0.15) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <!-- 音效控制栏 -->
    <div class="sound-controls">
        <button class="btn" id="muteBtn">🔊 静音</button>
        <div class="volume-control">
            <span>BGM:</span>
            <input type="range" id="bgmVolume" min="0" max="1" step="0.1" value="0.5">
        </div>
        <div class="volume-control">
            <span>SFX:</span>
            <input type="range" id="sfxVolume" min="0" max="1" step="0.1" value="0.7">
        </div>
    </div>

    <div class="header">
        <div class="stat"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
        <div class="stat"><div class="stat-label">等级</div><div class="stat-value" id="level">1</div></div>
        <div class="stat"><div class="stat-label">行数</div><div class="stat-value" id="lines">0</div></div>
        <div class="stat"><div class="stat-label">最高分</div><div class="stat-value" id="highScore">0</div></div>
        <button class="btn" id="saveBtn">💾 保存</button>
        <button class="btn" id="loadBtn">📂 读取</button>
        <button class="btn theme-toggle" id="themeToggleBtn">🎨 主题</button>
    </div>

    <!-- Combo特效容器 -->
    <div class="combo-container" id="comboContainer"></div>
    <canvas id="gameCanvas" width="240" height="480"></canvas>
    <div class="rotate-section">
        <button class="btn btn-rotate" id="rotateBtn">↻</button>
    </div>
    <div class="direction-controls">
        <button class="btn btn-left" id="leftBtn">←</button>
        <button class="btn btn-down" id="downBtn">↓</button>
        <button class="btn btn-right" id="rightBtn">→</button>
    </div>
    <div class="bottom-controls-container">
        <div class="game-controls">
            <button class="btn" id="startBtn">开始</button>
            <button class="btn" id="pauseBtn">暂停</button>
            <button class="btn" id="endBtn">结束</button>
        </div>
    </div>
    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-text">游戏结束</div>
        <div class="final-score">最终得分: <span id="finalScore">0</span></div>
        <button class="restart-btn" id="restartBtn">重新开始</button>
    </div>

            // 初始化音频上下文(移动端需要在用户交互后调用)
            initAudio() {
                if (this.isAudioInitialized) return;

                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();

                    // 创建音效增益节点
                    this.sfxGain = this.audioContext.createGain();
                    this.sfxGain.gain.value = this.sfxVolume;
                    this.sfxGain.connect(this.audioContext.destination);

                    // 创建BGM增益节点
                    this.bgmGain = this.audioContext.createGain();
                    this.bgmGain.gain.value = this.bgmVolume;
                    this.bgmGain.connect(this.audioContext.destination);

                    this.isAudioInitialized = true;
                    console.log('音频上下文已初始化');
                } catch (e) {
                    console.error('音频初始化失败:', e);
                }
            }

            // 预加载音频文件
            preload(urls, callback) {
                this.initAudio();

                const loadPromises = Object.entries(urls).map(([name, url]) => {
                    return fetch(url)
                        .then(response => response.arrayBuffer())
                        .then(arrayBuffer => this.audioContext.decodeAudioData(arrayBuffer))
                        .then(audioBuffer => {
                            this.buffers[name] = audioBuffer;
                            console.log(`已加载: ${name}`);
                        })
                        .catch(e => {
                            console.warn(`无法加载音效 ${name}: ${url}`, e);
                            // 使用空缓冲区避免播放失败
                            this.buffers[name] = null;
                        });
                });

                Promise.all(loadPromises).then(() => {
                    if (callback) callback();
                });
            }

            // 播放音效
            play(effectName) {
                if (this.isMuted || !this.buffers[effectName]) return;

                try {
                    const source = this.audioContext.createBufferSource();
                    source.buffer = this.buffers[effectName];
                    source.connect(this.sfxGain);
                    source.start(0);
                } catch (e) {
                    console.warn(`播放音效失败 ${effectName}:`, e);
                }
            }

            // 播放背景音乐
            playBGM(url, loop = true) {
                if (this.isMuted) return;

                // 停止当前BGM
                if (this.bgmSource) {
                    try {
                        this.bgmSource.stop();
                    } catch (e) {}
                }

                fetch(url)
                    .then(response => response.arrayBuffer())
                    .then(arrayBuffer => this.audioContext.decodeAudioData(arrayBuffer))
                    .then(audioBuffer => {
                        this.bgmSource = this.audioContext.createBufferSource();
                        this.bgmSource.buffer = audioBuffer;
                        this.bgmSource.loop = loop;
                        this.bgmSource.connect(this.bgmGain);
                        this.bgmSource.start(0);
                    })
                    .catch(e => console.warn('BGM加载失败:', e));
            }

            // 设置BGM音量
            setBGMVolume(volume) {
                this.bgmVolume = volume;
                if (this.bgmGain && !this.isMuted) {
                    this.bgmGain.gain.value = volume;
                }
            }

            // 设置音效音量
            setSFXVolume(volume) {
                this.sfxVolume = volume;
                if (this.sfxGain && !this.isMuted) {
                    this.sfxGain.gain.value = volume;
                }
            }

            // 全局静音切换
            toggleMute() {
                this.isMuted = !this.isMuted;

                if (this.bgmGain) {
                    this.bgmGain.gain.value = this.isMuted ? 0 : this.bgmVolume;
                }
                if (this.sfxGain) {
                    this.sfxGain.gain.value = this.isMuted ? 0 : this.sfxVolume;
                }

                return this.isMuted;
            }

            activateAudio() {
                this.initAudio();
                if (this.audioContext && this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
            }

                ctx.fillText(ct.text, ct.x, ct.y);
                ctx.restore();
            }
        }

        // 主题切换功能
        function initTheme() {
            const savedTheme = localStorage.getItem('tetrisThemeIndex');
            if (savedTheme !== null) {
                currentThemeIndex = parseInt(savedTheme);
                applyTheme();
            }
        }

        function applyTheme() {
            const theme = THEMES[currentThemeIndex];
            document.body.classList.remove('theme-cyberpunk-pink', 'theme-retro-green');
            if (theme.bodyClass) {
                document.body.classList.add(theme.bodyClass);
            }
            COLORS = [...theme.colors];
            document.getElementById('themeToggleBtn').textContent = '🎨 ' + theme.name;
            localStorage.setItem('tetrisThemeIndex', currentThemeIndex);
        }

        function switchTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % THEMES.length;
            applyTheme();
        }

        function drawBlock(x, y, color) { ctx.fillStyle = color; ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1); }        
        function draw() { 
            // 清空画布
            ctx.fillStyle = '#0f0f1a'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
            
            // 绘制背景粒子（星空）
            drawParticles();
            
            // 绘制已固定的方块
            for (let y = 0; y < ROWS; y++) { 
                for (let x = 0; x < COLS; x++) { 
                    if (board[y][x]) drawBlock(x, y, board[y][x]); 
                } 
            } 
            
            // 绘制所有拖尾残影（在绘制当前方块之前）
            for (const shadow of shadows) {
                const alpha = shadow.life / shadow.maxLife * 0.5; // 透明度从50%淡出到0%
                ctx.globalAlpha = Math.max(0, alpha);
                for (let y = 0; y < shadow.shape.length; y++) { 
                    for (let x = 0; x < shadow.shape[y].length; x++) { 
                        if (shadow.shape[y][x]) {
                            drawBlock(shadow.x + x, shadow.y + y, shadow.color); 
                        }
                    } 
                }
                ctx.globalAlpha = 1.0;
            }
            
            // 绘制当前下落的方块
            if (currentPiece) { 
            // 绘制消除行特效粒子
            drawTempParticles();
                for (let y = 0; y < currentPiece.shape.length; y++) { 
                    for (let x = 0; x < currentPiece.shape[y].length; x++) { 
                        if (currentPiece.shape[y][x]) {
                            drawBlock(currentPiece.x + x, currentPiece.y + y, currentPiece.color); 
                        }
                    } 
                } 
            }
        }
        function checkCollision(piece, x, y) { for (let r = 0; r < piece.shape.length; r++) { for (let c = 0; c < piece.shape[r].length; c++) { if (piece.shape[r][c]) { const nx = x + c, ny = y + r; if (nx < 0 || nx >= COLS || ny >= ROWS) return true; if (ny >= 0 && board[ny][nx]) return true; } } } return false; }
        function rotatePiece(piece) { const rotated = { ...piece, shape: [] }; for (let c = 0; c < piece.shape[0].length; c++) { rotated.shape[c] = []; for (let r = piece.shape.length - 1; r >= 0; r--) rotated.shape[c].push(piece.shape[r][c]); } return rotated; }

        function lockPiece() { 
            if (!currentPiece) return;
            
            for (let r = 0; r < currentPiece.shape.length; r++) { 
                for (let c = 0; c < currentPiece.shape[r].length; c++) { 
                    if (currentPiece.shape[r][c]) { 
                        const y = currentPiece.y + r, x = currentPiece.x + c; 
                        if (y >= 0 && y < ROWS) board[y][x] = currentPiece.color; 
                    } 
                } 
            } 
            // 播放落地音效
            soundManager.play('land');
            
            // 注意：不立即清除残影，让它们自然淡出
            // pieceGhost = null; // 已删除旧系统
            
            clearLines(); 
            spawnPiece(); 
        }

        function clearLines() {
            let cleared = 0;
            // 先记录被消除的行号（从底部向上）
            const clearedRows = [];
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    clearedRows.push(y); // 记录被消除的行号
                }
            }
            // 再执行清除操作 - 使用记录的 clearedRows 数组
            for (let i = clearedRows.length - 1; i >= 0; i--) {
                const rowY = clearedRows[i];
                board.splice(rowY, 1);
                board.unshift(Array(COLS).fill(0));
                cleared++;
            }
            if (cleared > 0) {
                // Combo检测：判断时间间隔
                const now = Date.now();
                if (now - lastClearTime < COMBO_TIMEOUT) {
                    comboCount++; // 间隔小于1秒，继续累加
                } else {
                    comboCount = 1; // 间隔超过1秒，重置为1
                }
                lastClearTime = now;
                
                // 重置无消除落地计数
                landCountWithoutClear = 0;
                
                // 计算基础分数
                const basePoints = [0, 100, 300, 600, 1000];
                let points = basePoints[cleared] || 0;
                
                // 应用Combo积分加成
                const multiplier = getComboMultiplier(comboCount);
                points = Math.floor(points * multiplier);
                
                score += points;
                lines += cleared;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(200, 1000 - (level - 1) * 50);

                // 显示Combo特效（comboCount >= 1就显示）
                showCombo(comboCount);

                updateUI();

                // 根据消除行数播放不同音效
                if (cleared >= 4) {
                    soundManager.play('clear_four');
                } else {
                    soundManager.play('clear_single');
                }

                // 粒子特效 - 在消除行区域生成彩色粒子
                for (let i = clearedRows.length - 1; i >= 0; i--) {
                const rowY = clearedRows[i];
                    createTempParticles(rowY);
                }
                // 振动反馈
                if ('vibrate' in navigator) {
                    navigator.vibrate([50, 20, 50]);
                }
            } else {
                // 没有消除时，增加无消除落地计数
                landCountWithoutClear++;
                // 落地3次无消除，重置combo
                if (landCountWithoutClear >= 3) {
                    comboCount = 0;
                    landCountWithoutClear = 0;
                }
            }
        }

        function spawnPiece() {
            currentPiece = getNextPiece();
            if (checkCollision(currentPiece, currentPiece.x, currentPiece.y)) {
                gameOver();
            }
        }

        function movePiece(dx, dy) { 
            if (isGameOver || !currentPiece) return false; 
            
            // 先检查碰撞，计算新位置
            const newX = currentPiece.x + dx;
            const newY = currentPiece.y + dy;
            
            if (!checkCollision(currentPiece, newX, newY)) { 
                // 移动前记录位置和颜色，用于生成残影
                const oldX = currentPiece.x;
                const oldY = currentPiece.y;
                const oldShape = currentPiece.shape.map(row => [...row]);
                const oldColor = currentPiece.color;
                
                currentPiece.x = newX; 
                currentPiece.y = newY; 
                
                // 移动成功后，在移动前的位置生成残影
                addShadow(oldX, oldY, oldShape, oldColor);
                
                // 移动成功时播放移动音效
                soundManager.play('move');
                return true; 
            } 
            
            // 如果是向下移动发生碰撞，则锁定方块
            if (dy > 0) { 
                // 振动反馈
                if ('vibrate' in navigator) {
                  navigator.vibrate([60]);
                }
                return false;
            } 
            return false; 
        }

        function rotate() { 
            if (isGameOver || !currentPiece) return; 
            
            const oldX = currentPiece.x;
            const oldY = currentPiece.y;
            const oldShape = currentPiece.shape.map(row => [...row]);
            
            const rotated = rotatePiece(currentPiece); 
            if (!checkCollision(rotated, currentPiece.x, currentPiece.y)) { 
                currentPiece = rotated; 
                // 旋转成功后，在旋转前的位置生成残影
                addShadow(oldX, oldY, oldShape, currentPiece.color);
                // 旋转成功时播放旋转音效
                soundManager.play('rotate');
            } 
        }

        let lastTime = 0; // 用于计算deltaTime
        function gameLoop(timestamp) {
          // 计算deltaTime（毫秒）
          const deltaTime = lastTime ? timestamp - lastTime : 16.67; // 首次调用默认60fps
          lastTime = timestamp;
          
          if (!isGameOver && !isPaused && timestamp - lastDrop > dropInterval) {
            if (!movePiece(0, 1)) { // 如果返回false表示方块已经落地
              lockPiece();
              clearLines();
              spawnPiece();
            }
            lastDrop = timestamp;
          }
          
          // 更新残影生命周期
          updateShadows(deltaTime);
          
          // 更新Combo文字动画
          updateComboTexts(deltaTime);
          
          updateParticles();
          updateTempParticles();
          draw();
          drawComboTexts();
          if (!isGameOver) {
            animationFrameId = requestAnimationFrame(gameLoop);
          }
        }

        document.getElementById('leftBtn').onclick = () => movePiece(-1, 0);
        document.getElementById('rightBtn').onclick = () => movePiece(1, 0);
        document.getElementById('downBtn').onclick = () => movePiece(0, 1);
        document.getElementById('rotateBtn').onclick = rotate;
        document.getElementById('restartBtn').onclick = start;

        // Control button event bindings
        document.getElementById('startBtn').onclick = start;
        document.getElementById('pauseBtn').onclick = () => {
          pause();
          document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
        };
        document.getElementById('endBtn').onclick = gameOver;
        document.getElementById('saveBtn').onclick = saveGame;
        document.getElementById('loadBtn').onclick = loadGame;

        // Theme switching
        const themeToggleBtn = document.getElementById('themeToggleBtn');

        themeToggleBtn.addEventListener('click', switchTheme);

        // Load theme preference on load
        initTheme();

        // 底部按钮收起状态
        let hasAutoCollapsed = false;

        function expandBottomControls() {
          const container = document.querySelector('.bottom-controls-container');
          if (container) {
            container.classList.remove('collapsed');
          }
        }

        function collapseBottomControls() {
          const container = document.querySelector('.bottom-controls-container');
          if (container) {
            container.classList.add('collapsed');
          }
        }

        // 初始化底部按钮为收起状态(细线)
        collapseBottomControls();

        // 上滑手势检测
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
          touchStartY = e.touches[0].clientY;
          // 移动端首次触摸激活音频
          soundManager.activateAudio();
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
          const touchEndY = e.changedTouches[0].clientY;
          const deltaY = touchStartY - touchEndY;
          const screenHeight = window.innerHeight;

          if (deltaY > 30 && touchStartY > screenHeight * 0.7) {
            expandBottomControls();
            hasAutoCollapsed = false;
          }
        }, { passive: true });

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') movePiece(-1, 0);
            else if (e.key === 'ArrowRight') movePiece(1, 0);
            else if (e.key === 'ArrowDown') movePiece(0, 1);
            else if (e.key === 'ArrowUp') rotate();
        });

        // Save and load game functionality
        function saveGame() {
          if (isGameOver) {
            alert('无法保存已结束的游戏');
            return;
          }

          const gameState = {
            board: board,
            currentPiece: currentPiece,
            score: score,
            level: level,
            lines: lines,
            isGameOver: isGameOver,
            isPaused: isPaused,
            dropInterval: dropInterval,
            lastDrop: lastDrop,
            bag: bag,
            timestamp: Date.now()
          };

          try {
            localStorage.setItem('tetrisGameState', JSON.stringify(gameState));
            alert('游戏已保存!');
          } catch (e) {
            alert('保存失败: ' + e.message);
            console.error('Save error:', e);
          }
        }

        function loadGame() {
          try {
            const savedState = localStorage.getItem('tetrisGameState');
            if (!savedState) {
              alert('没有找到保存的游戏');
              return;
            }

            const gameState = JSON.parse(savedState);

            // Validate basic structure
            if (!gameState.board || !gameState.currentPiece) {
              alert('保存的游戏数据损坏');
              return;
            }

            // Restore game state
            board = gameState.board;
            currentPiece = gameState.currentPiece;
            score = gameState.score;
            level = gameState.level;
            lines = gameState.lines;
            isGameOver = gameState.isGameOver;
            isPaused = gameState.isPaused;
            dropInterval = gameState.dropInterval;
            bag = gameState.bag;
            
            // 重置时间相关变量，避免时间计算错误
            lastTime = 0; // 重置lastTime，让gameLoop第一帧使用默认deltaTime
            lastDrop = performance.now(); // 重置lastDrop为当前时间，避免立即触发下落
            
            // 清空残影数组（旧的残影已经无效）
            shadows = [];
            
            // 重置Combo相关变量
            comboCount = 0;
            landCountWithoutClear = 0;
            comboTexts = [];

            // Update UI
            updateUI();

            // If game was over when saved, show game over overlay
            if (isGameOver) {
              document.getElementById('gameOverOverlay').classList.add('show');
              document.getElementById('finalScore').textContent = score;
            } else {
              document.getElementById('gameOverOverlay').classList.remove('show');
              
              // 取消现有的游戏循环（如果存在）
              if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
              }
              
              // 立即绘制游戏界面
              draw();
              
              // 如果游戏没有暂停，启动新的游戏循环
              if (!isPaused && !isGameOver) {
                animationFrameId = requestAnimationFrame(gameLoop);
              }
            }

            // Update pause button text
            document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';

            alert('游戏已读取!');
          } catch (e) {
            alert('读取失败: ' + e.message);
            console.error('Load error:', e);
          }
        }

        function start() {
          resetGame();
          if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
          }
          animationFrameId = requestAnimationFrame(gameLoop);
          draw();

          // 激活音频上下文
          soundManager.activateAudio();

          // 尝试播放BGM
          soundManager.playBGM(soundUrls.bgm, true);

          hasAutoCollapsed = false;
          setTimeout(() => {
            if (!hasAutoCollapsed) {
              collapseBottomControls();
              hasAutoCollapsed = true;
            }
          }, 20000);
        }

        function pause() {
          isPaused = !isPaused;
        }

        function gameOver() {
          isGameOver = true;
          if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
          }
          // 振动反馈
          if ('vibrate' in navigator) {
            navigator.vibrate([200, 100, 200, 100, 200]);
          }
          // 播放游戏结束音效
          soundManager.play('game_over');
          // 停止BGM
          if (soundManager.bgmSource) {
              try { soundManager.bgmSource.stop(); } catch(e) {}
          }

          if (score > highScore) {
            highScore = score;
            localStorage.setItem('tetrisHighScore', highScore);
            document.getElementById('highScore').textContent = highScore;
          }
          document.getElementById('finalScore').textContent = score;
          document.getElementById('gameOverOverlay').classList.add('show');
        }

        // ========== 音效控制绑定 ==========
        document.getElementById('muteBtn').onclick = () => {
            const isMuted = soundManager.toggleMute();
            document.getElementById('muteBtn').textContent = isMuted ? '🔇 取消静音' : '🔊 静音';
        };

        document.getElementById('bgmVolume').oninput = (e) => {
            soundManager.setBGMVolume(parseFloat(e.target.value));
        };

        document.getElementById('sfxVolume').oninput = (e) => {
            soundManager.setSFXVolume(parseFloat(e.target.value));
        };
    </script>
</body>
</html>
